<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Tappy Screenshot 05</title>
  <link rel="stylesheet" href="common.css">
</head>
<body>
  <div class="frame">
    <div class="hero">
      <div class="copy">
        <p class="eyebrow">Made For Focus</p>
        <h1>Know Tappy is live everywhere.</h1>
        <p>Clear status shows when system-wide sound is active.</p>
        <div class="callout-row">
          <div class="chip">Live status</div>
          <div class="chip">Volume control</div>
        </div>
      </div>

      <div class="stage">
        <div class="window shift-left">
          <div class="titlebar">
            <span class="dot red"></span>
            <span class="dot yellow"></span>
            <span class="dot green"></span>
          </div>
          <div class="window-inner">
            <div class="topbar">
              <div class="wordmark">Tappy</div>
              <div class="spacer"></div>
              <div class="cta">Preview</div>
              <div class="toggle"></div>
            </div>

            <div class="detail-panel" style="margin-top:24px;">
              <div class="detail-title">
                <h2>System-wide Status</h2>
              </div>

              <div class="stack">
                <div class="list-row">
                  <div class="status-dot status-green">✓</div>
                  <div>
                    <h3>Current Pack</h3>
                    <p>Bubble is loaded for every app.</p>
                  </div>
                </div>
                <div class="list-row">
                  <div class="status-dot status-green">✓</div>
                  <div>
                    <h3>Input Monitoring</h3>
                    <p>Ready for background typing sounds.</p>
                  </div>
                </div>
              </div>

              <div class="preview-row" style="margin-top:18px;">
                <div class="secondary-cta">Try Pack</div>
                <div class="secondary-cta">Reveal Sounds</div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
